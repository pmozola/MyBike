<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Wishlist</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>

    <ion-item-group *ngFor="let category of categories">
      <ion-item-divider sticky>
        <ion-label>
          {{category}}
        </ion-label>
      </ion-item-divider>


      <ion-item-sliding *ngFor="let wish of getWishForCategory(category)">
        <ion-item-options side="start">
          <ion-item-option color="danger" (click)="deleteWish(wish.id)">
            <ion-icon slot="start" name="trash"></ion-icon>
            Delete
          </ion-item-option>
        </ion-item-options>

        <ion-item (click)="navigateToDetail(wish.id)" detail="true">
          <ion-label>
            {{wish.name}}
          </ion-label>
        </ion-item>
      </ion-item-sliding>
    </ion-item-group>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addWish()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- <ion-fab color="light" vertical="bottom" horizontal="end" slot="fixed">
    <ion-icon name="star"></ion-icon>
  </ion-fab> -->
  <!-- <ion-fab-button color="light" >
        <ion-icon name="star"></ion-icon>
      </ion-fab-button> -->
</ion-content>
